<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>开发岗位筛选助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      width: 360px;
      padding: 16px;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header .logo { font-size: 24px; }
    .header .title { font-size: 16px; font-weight: 700; }
    .header .version { font-size: 11px; color: #ccc; margin-left: auto; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      text-align: center;
      padding: 10px 4px;
      border-radius: 8px;
      background: #fafafa;
    }
    .stat .num { font-size: 20px; font-weight: 700; }
    .stat .lbl { font-size: 11px; color: #999; margin-top: 2px; }
    .stat.s1 .num { color: #1677ff; }
    .stat.s2 .num { color: #52c41a; }
    .stat.s3 .num { color: #faad14; }
    .stat.s4 .num { color: #f5222d; }

    .job-list { margin-bottom: 16px; }
    .job-list h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
    .job-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .job-item .name { font-weight: 500; }
    .job-item .badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #e6fffb;
      color: #00A6A7;
    }

    .actions {
      display: flex;
      gap: 8px;
    }
    .actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .actions button:hover {
      border-color: #00A6A7;
      color: #00A6A7;
    }
    .actions .primary {
      background: #00A6A7;
      color: white;
      border-color: #00A6A7;
    }
    .actions .primary:hover {
      background: #008f90;
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: #ccc;
      font-size: 13px;
    }

    .recent { margin-top: 12px; }
    .recent h3 { font-size: 13px; color: #666; margin-bottom: 8px; }
    .recent-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
      border-bottom: 1px solid #f8f8f8;
    }
    .recent-item .score { font-weight: 600; }
    .recent-item .score.green { color: #52c41a; }
    .recent-item .score.orange { color: #faad14; }
    .recent-item .score.red { color: #f5222d; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🦐</span>
    <span class="title">开发岗位筛选助手</span>
    <span class="version">v0.3.0</span>
  </div>

  <div class="stats" id="stats">
    <div class="stat s1"><div class="num" id="statTotal">-</div><div class="lbl">总数</div></div>
    <div class="stat s2"><div class="num" id="statQualified">-</div><div class="lbl">合格</div></div>
    <div class="stat s3"><div class="num" id="statPending">-</div><div class="lbl">待定</div></div>
    <div class="stat s4"><div class="num" id="statUnqualified">-</div><div class="lbl">不合格</div></div>
  </div>

  <div class="job-list" id="jobList">
    <h3>📋 已保存的职位 JD</h3>
    <div id="jobListContent" class="empty">暂无已保存的职位</div>
  </div>

  <div class="recent" id="recentSection" style="display:none;">
    <h3>🕐 最近评估</h3>
    <div id="recentList"></div>
  </div>

  <div class="actions">
    <button id="settingsBtn">⚙️ 设置</button>
    <button class="primary" id="openBossBtn">📖 打开 BOSS 直聘</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
