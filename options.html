<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>开发岗位筛选助手 - 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .section h2 {
      font-size: 16px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    label {
      display: block;
      margin-bottom: 16px;
    }
    label .label-text {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }
    label .label-hint {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    input[type="text"], input[type="password"], input[type="number"], select, textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #00A6A7;
      box-shadow: 0 0 0 3px rgba(0,166,167,0.1);
    }
    textarea { resize: vertical; min-height: 80px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-save {
      background: #00A6A7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #008f90; }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .saved-msg {
      display: inline-block;
      margin-left: 12px;
      color: #52c41a;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
    .btn-danger {
      background: white;
      color: #f5222d;
      border: 1px solid #f5222d;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: #f5222d; color: white; }
    .api-test {
      display: inline-block;
      margin-left: 12px;
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      cursor: pointer;
      background: white;
    }
    .api-test:hover { border-color: #00A6A7; color: #00A6A7; }
    .api-status {
      margin-left: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🦐 开发岗位筛选助手 · 设置</h1>

  <!-- LLM API 配置 -->
  <div class="section">
    <h2>🤖 AI 模型配置</h2>

    <label>
      <span class="label-text">API 提供商</span>
      <select id="llmProvider">
        <option value="openai">OpenAI</option>
        <option value="custom">自定义（OpenAI 兼容格式）</option>
      </select>
    </label>

    <label>
      <span class="label-text">API Key</span>
      <input type="password" id="apiKey" placeholder="sk-...">
      <span class="label-hint">你的 API Key 只保存在本地浏览器，不会上传到任何服务器</span>
    </label>

    <div class="row">
      <label>
        <span class="label-text">API 地址</span>
        <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
        <span class="label-hint">使用自定义提供商时修改此地址</span>
      </label>
      <label>
        <span class="label-text">模型</span>
        <input type="text" id="model" placeholder="gpt-4o">
      </label>
    </div>

    <div class="row">
      <label>
        <span class="label-text">单次最大 Token</span>
        <input type="number" id="maxTokens" placeholder="2000">
      </label>
      <label>
        <span class="label-text">每日请求上限</span>
        <input type="number" id="dailyLimit" placeholder="200">
      </label>
    </div>

    <button class="api-test" id="testApiBtn">🧪 测试连接</button>
    <span class="api-status" id="apiStatus"></span>
  </div>

  <!-- HR 信息 -->
  <div class="section">
    <h2>👤 HR 信息</h2>
    <div class="row">
      <label>
        <span class="label-text">HR 名称</span>
        <input type="text" id="hrbpName" placeholder="HR小李">
        <span class="label-hint">AI 沟通时使用的自称</span>
      </label>
      <label>
        <span class="label-text">公司名称</span>
        <input type="text" id="companyName" placeholder="XX科技">
      </label>
    </div>
  </div>

  <!-- 消息模板 -->
  <div class="section">
    <h2>💬 消息模板</h2>
    <label>
      <span class="label-text">礼貌拒绝模板</span>
      <textarea id="rejectTemplate" rows="3" placeholder="感谢您的关注！..."></textarea>
      <span class="label-hint">不合格候选人自动发送的消息</span>
    </label>
  </div>

  <!-- 数据管理 -->
  <div class="section">
    <h2>🗂️ 数据管理</h2>
    <p style="font-size:13px; color:#666; margin-bottom:12px;">所有数据保存在本地浏览器中</p>
    <button class="btn-danger" id="clearCandidates">清空候选人数据</button>
    <button class="btn-danger" id="clearJobs" style="margin-left:8px;">清空职位 JD</button>
    <button class="btn-danger" id="clearAll" style="margin-left:8px;">重置所有数据</button>
  </div>

  <div style="margin-top:16px;">
    <button class="btn-save" id="saveBtn">💾 保存设置</button>
    <span class="saved-msg" id="savedMsg">✅ 已保存</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
